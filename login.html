<!DOCTYPE html>
<html lang="en" dir="ltr" id="root-html">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="assets/chef.png">
    <title>STITCH | Authentication</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:italic,wght@400;600&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { gold: '#C5A059' },
                    fontFamily: { 
                        serif: ['Cormorant Garamond', 'serif'], 
                        sans: ['Montserrat', 'sans-serif'] 
                    }
                }
            }
        }
    </script>
    <style>
        .auth-card { transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .fade-in { animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        /* Custom input focus ring for luxury feel */
        input:focus { box-shadow: 0 1px 0 0 #C5A059; }
    </style>
</head>
<body class="bg-[#F9F8F6] dark:bg-zinc-950 font-sans transition-colors duration-500 overflow-x-hidden">

    <nav class="fixed top-0 w-full z-50 p-6 flex justify-between items-center">
        <a href="index.html" class="text-xl lg:text-2xl font-serif font-bold tracking-[0.15em] lg:tracking-[0.2em] text-gold">
            STITCH
        </a>

        <div class="flex items-center gap-4">
            <button onclick="toggleDirection()" class="p-2 w-10 h-10 rounded-full border border-gray-200 dark:border-zinc-800 flex items-center justify-center text-[10px] font-bold text-gray-600 dark:text-gray-400 hover:border-gold transition-all">
                <span id="dir-text">LTR</span>
            </button>
            <button onclick="toggleTheme()" class="p-2 w-10 h-10 rounded-full bg-white dark:bg-zinc-900 shadow-sm border border-gray-100 dark:border-zinc-800 text-gray-600 dark:text-gold hover:scale-110 transition-all">
                <i id="theme-icon" class="fa-solid fa-moon"></i>
            </button>
        </div>
    </nav>

    <main class="min-h-screen flex items-center justify-center p-6 pt-24 md:pt-6">
        <div class="w-full max-w-[1024px] bg-white dark:bg-zinc-900 shadow-2xl rounded-sm overflow-hidden grid grid-cols-1 lg:grid-cols-2 auth-card">
            
            <div class="hidden lg:block relative overflow-hidden group">
                <img src="assets/Bespoke Craftsmanship" 
                     class="absolute inset-0 w-full h-full object-cover transition-transform duration-[5s] group-hover:scale-110" alt="Bespoke Suit">
                <div class="absolute inset-0 bg-black/40 group-hover:bg-black/20 transition-colors duration-700"></div>
                <div class="absolute inset-0 flex flex-col justify-end p-12 text-white">
                    <h2 class="text-4xl font-serif italic mb-4">The mark of <br> a gentleman.</h2>
                    <p class="text-sm tracking-widest opacity-70 uppercase">Exclusive Bespoke Community</p>
                </div>
            </div>

            <div class="p-8 md:p-12 lg:p-16 relative flex flex-col justify-center min-h-[550px]">
                
                <div id="login-section" class="space-y-8 fade-in">
                    <div>
                        <h1 class="text-3xl font-serif text-gray-900 dark:text-white text-center mb-2 leading-tight">Welcome Back</h1>
                        <p class="text-xs text-gray-400 uppercase text-center tracking-widest">Login to your account</p>
                    </div>

                    <form class="space-y-6">
                        <div class="space-y-1">
                            <label class="text-[10px] font-bold uppercase tracking-widest text-gray-400">Email Address</label>
                            <input type="email" required
                                   class="w-full bg-gray-50 dark:bg-zinc-800 border-b border-gray-200 dark:border-zinc-700 p-3 text-sm focus:outline-none focus:border-gold dark:text-white transition-all">
                        </div>
                        
                        <div class="space-y-1">
                            <div class="flex justify-between items-center">
                                <label class="text-[10px] font-bold uppercase tracking-widest text-gray-400">Password</label>
                                <a href="#" class="text-[9px] uppercase tracking-widest text-gold hover:underline">Forgot Password?</a>
                            </div>
                            <input type="password" required
                                   class="w-full bg-gray-50 dark:bg-zinc-800 border-b border-gray-200 dark:border-zinc-700 p-3 text-sm focus:outline-none focus:border-gold dark:text-white transition-all">
                        </div>

                        <button type="submit" class="w-full py-4 bg-gray-900 dark:bg-gold text-white dark:text-zinc-950 text-xs font-bold uppercase tracking-[0.3em] hover:bg-gold dark:hover:bg-white transition-all shadow-lg active:scale-95">
                            Sign In
                        </button>
                    </form>

                    <div class="space-y-6">
                        <div class="flex items-center gap-4">
                            <div class="h-[1px] flex-1 bg-gray-100 dark:bg-zinc-800"></div>
                            <span class="text-[10px] text-gray-400 uppercase tracking-widest">Or continue with</span>
                            <div class="h-[1px] flex-1 bg-gray-100 dark:bg-zinc-800"></div>
                        </div>
                        <div class="flex justify-center gap-6">
                            <button class="w-12 h-12 rounded-full border border-gray-100 dark:border-zinc-800 flex items-center justify-center hover:border-gold text-gray-600 dark:text-gray-400 transition-all hover:-translate-y-1"><i class="fa-brands fa-google text-lg"></i></button>
                            <button class="w-12 h-12 rounded-full border border-gray-100 dark:border-zinc-800 flex items-center justify-center hover:border-gold text-gray-600 dark:text-gray-400 transition-all hover:-translate-y-1"><i class="fa-brands fa-apple text-xl"></i></button>
                            <button class="w-12 h-12 rounded-full border border-gray-100 dark:border-zinc-800 flex items-center justify-center hover:border-gold text-gray-600 dark:text-gray-400 transition-all hover:-translate-y-1"><i class="fa-brands fa-facebook-f text-lg"></i></button>
                        </div>
                    </div>

                    <p class="text-center text-[10px] text-gray-400 uppercase tracking-widest pt-4">
                        New to the Atelier? 
                        <a href="regeister.html" class="text-gold font-bold hover:underline ml-1 transition-all">Create an account</a>
                    </p>
                </div>

            </div>
        </div>
    </main>

    <script>
        // --- 1. THEME TOGGLE (Persistence enabled) ---
        function toggleTheme() {
            const html = document.documentElement;
            const icon = document.getElementById('theme-icon');
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                icon.className = 'fa-solid fa-moon';
                localStorage.setItem('atelier-theme', 'light');
            } else {
                html.classList.add('dark');
                icon.className = 'fa-solid fa-sun';
                localStorage.setItem('atelier-theme', 'dark');
            }
        }

        // --- 2. LTR/RTL TOGGLE ---
        function toggleDirection() {
            const html = document.getElementById('root-html');
            const dirText = document.getElementById('dir-text');
            if (html.dir === 'ltr') {
                html.dir = 'rtl';
                dirText.innerText = 'RTL';
                localStorage.setItem('atelier-dir', 'rtl');
            } else {
                html.dir = 'ltr';
                dirText.innerText = 'LTR';
                localStorage.setItem('atelier-dir', 'ltr');
            }
        }

        // --- 3. INITIALIZE PREFERENCES ON LOAD ---
        window.onload = () => {
            // Theme Sync
            if (localStorage.getItem('atelier-theme') === 'dark' || 
                (!('atelier-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
                document.getElementById('theme-icon').className = 'fa-solid fa-sun';
            }
            // Direction Sync
            if (localStorage.getItem('atelier-dir') === 'rtl') {
                document.getElementById('root-html').dir = 'rtl';
                document.getElementById('dir-text').innerText = 'RTL';
            }
        };
    </script>
</body>
</html>
